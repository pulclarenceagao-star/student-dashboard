<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(270deg, #4facfe, #00f2fe, #43e97b);
    background-size: 600% 600%;
    animation: gradientBG 10s ease infinite;
}

/* Background Animation */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.login-box {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    width: 300px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.login-box h2 {
    color: white;
    margin-bottom: 20px;
}

.input-box {
    position: relative;
    margin-bottom: 20px;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
    border-radius: 5px;
}

/* Button Animation */
.btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #4facfe;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #00c6ff;
    transform: scale(1.05);
}

.message {
    margin-top: 10px;
    color: yellow;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>🎓 Student Login</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Student ID">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn" onclick="login()">Login</button>

    <div class="message" id="message"></div>
</div>

<script>
function login() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    var correctUser = "student123";
    var correctPass = "12345";

    if(user === correctUser && pass === correctPass){
        document.getElementById("message").innerText = "Login Success!";
        
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);
    } else {
        document.getElementById("message").innerText = "Invalid Login!";
    }
}
</script>

</body>
</html>
